spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false

jwt:
  secret: testSecretKeyThatIsAtLeast32CharactersLong12345
  expiration: 86400000

app:
  refresh-token:
    duration-ms: 2592000000
  cookie:
    refresh-path: /auth
    max-age-seconds: 2592000
    secure: false