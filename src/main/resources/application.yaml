spring:
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN
  config:
    import: optional:file:.env[.properties]
  application:
    name: MyAnimeList


  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    enabled: true
    change-log: classpath:/db/changelog/changelog_master.yaml


logging:
  level:
    org.hibernate.sql: DEBUG

